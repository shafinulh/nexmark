#==============================================================================
# Rest & web frontend
#==============================================================================

# The metric reporter server host.
nexmark.metric.reporter.host: localhost
# The metric reporter server port.
nexmark.metric.reporter.port: 9098

#==============================================================================
# Benchmark workload configuration (events.num)
#==============================================================================

nexmark.workload.suite.tp-200m.events.num: 12500000
nexmark.workload.suite.tp-200m.tps: 50000
nexmark.workload.suite.tp-200m.queries: "q0,q1,q2,q3,q4,q4_unique,q5,q7,q8,q9,q9_unique,q10,q11,q12,q13,q14,q15,q16,q17,q18,q18_unique,q19,q19_unique,q20,q20_unique,q20_unique_modified,q21,q22"
nexmark.workload.suite.tp-200m.queries.cep: "q0,q1,q2,q3"
nexmark.workload.suite.tp-200m.warmup.events.num: 50000000
nexmark.workload.suite.tp-200m.person.proportion: 1
nexmark.workload.suite.tp-200m.auction.proportion: 3
nexmark.workload.suite.tp-200m.bid.proportion: 46
nexmark.workload.suite.tp-200m.num-in-flight-auctions: 100
nexmark.workload.suite.tp-200m.out-of-order-group-size: 1
nexmark.workload.suite.tp-200m.prob-delayed-event: 0.0
nexmark.workload.suite.tp-200m.occasional-delay.min-sec: 60
nexmark.workload.suite.tp-200m.occasional-delay.sec: 240

#==============================================================================
# Benchmark workload configuration (tps, legacy mode)
# Without events.num and with monitor.duration
# NOTE: The numerical value of TPS is unstable
#==============================================================================

# Runner version 2

nexmark.runner.version: v2

# When to monitor the metrics, default 3min after job is started
# nexmark.metric.monitor.delay: 3min
# How long to monitor the metrics, default 3min, i.e. monitor from 3min to 6min after job is started
# nexmark.metric.monitor.duration: 3min

# nexmark.workload.suite.10m.tps: 10000000
# nexmark.workload.suite.10m.queries: "q0,q1,q2,q3,q4,q5,q7,q8,q9,q10,q11,q12,q13,q14,q15,q16,q17,q18,q19,q20,q21,q22"

#==============================================================================
# Flink REST
#==============================================================================

flink.rest.address: localhost
flink.rest.port: 8081

