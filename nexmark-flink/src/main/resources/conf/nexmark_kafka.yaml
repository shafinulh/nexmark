################################################################################
# Kafka template for the unique 3-topic Nexmark workflow.
# Copy the contents of this file into nexmark.yaml when you want to load Kafka
# or replay queries from Kafka.
################################################################################

#==============================================================================
# Rest & web frontend
#==============================================================================

# The metric reporter server host.
nexmark.metric.reporter.host: localhost
# The metric reporter server port.
nexmark.metric.reporter.port: 9098

#==============================================================================
# Benchmark workload configuration (events.num)
#==============================================================================

nexmark.workload.suite.kafka-preload.events.num: 50000000
nexmark.workload.suite.kafka-preload.tps: 50000
nexmark.workload.suite.kafka-preload.percentage: "person:2,auction:6,bid:92"
nexmark.workload.suite.kafka-preload.queries: "insert_kafka_unique"

#==============================================================================
# Benchmark workload configuration (Kafka replay via TPS mode)
#==============================================================================

# Applies to TPS-mode replay queries. Bounded preload queries ignore this and
# monitor until the job finishes.
nexmark.metric.monitor.duration: 60min
nexmark.workload.suite.kafka-replay.warmup.duration: 30s
nexmark.workload.suite.kafka-replay.percentage: "person:2,auction:6,bid:92"
nexmark.workload.suite.kafka-replay.queries: "q0,q1,q2,q3,q4,q4_unique,q5,q7,q8,q9,q9_unique,q10,q11,q12,q13,q14,q15,q16,q17,q18,q18_unique,q19,q19_unique,q20,q20_unique,q20_unique_modified,q21,q22,q23"
nexmark.workload.suite.kafka-replay.queries.cep: "q0,q1,q2,q3"

#==============================================================================
# Runner version
#==============================================================================

nexmark.runner.version: v1

#==============================================================================
# Flink REST
#==============================================================================

flink.rest.address: localhost
flink.rest.port: 8081

#==============================================================================
# Kafka config
#==============================================================================

kafka.bootstrap.servers: c180:9092
